<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime WS Dashboard</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0f172a;
    color:white;
}
.container { padding:30px; }

.card {
    background:#1e293b;
    padding:20px;
    margin:10px 0;
    border-radius:12px;
}

.num {
    font-size:40px;
    color:#22d3ee;
}
.live {
    color:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 WebSocket Dashboard <span class="live">LIVE</span></h1>

<div class="card">
Pending: <div id="pending" class="num">0</div>
</div>

<div class="card">
Processing: <div id="processing" class="num">0</div>
</div>

<div class="card">
Failed: <div id="failed" class="num">0</div>
</div>

<pre id="raw"></pre>

</div>

<script>

// 🔥 CONNECT WEBSOCKET (REALTIME)
const ws = new WebSocket("wss://" + location.host + "/ws");

ws.onmessage = function(event) {
    const data = JSON.parse(event.data);

    document.getElementById("pending").innerText = data.pending;
    document.getElementById("processing").innerText = data.processing;
    document.getElementById("failed").innerText = data.failed;

    document.getElementById("raw").innerText =
        JSON.stringify(data.status, null, 2);
};

ws.onopen = () => console.log("WS connected");
ws.onclose = () => console.log("WS disconnected");

</script>

</body>
</html>
